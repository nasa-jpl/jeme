name: Mirror to nasa-jpl/jeme

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify token has push access to nasa-jpl/jeme
        run: |
          body=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.NASA_JPL_MIRROR_TOKEN }}" \
            https://api.github.com/repos/nasa-jpl/jeme)
          login=$(echo "$body" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('owner',{}).get('login','unknown'))" 2>/dev/null || echo "unknown")
          push=$(echo "$body"  | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('permissions',{}).get('push', False))" 2>/dev/null || echo "False")
          echo "Authenticated as: $login"
          echo "Push permission:  $push"
          if [ "$push" != "True" ]; then
            echo ""
            echo "ERROR: token does not have push access to nasa-jpl/jeme."
            echo "Fix: create a classic PAT with 'repo' scope from an account that has"
            echo "write access to nasa-jpl/jeme, then save it as NASA_JPL_MIRROR_TOKEN."
            echo "If nasa-jpl uses SAML SSO, also authorize the PAT for that org at"
            echo "https://github.com/settings/tokens"
            exit 1
          fi

      - name: Push mirror to nasa-jpl/jeme
        run: |
          git remote add nasa-jpl https://x-access-token:${{ secrets.NASA_JPL_MIRROR_TOKEN }}@github.com/nasa-jpl/jeme.git
          git push nasa-jpl --mirror
